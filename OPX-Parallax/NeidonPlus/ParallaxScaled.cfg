@ParallaxTerrain:NEEDS[Parallax_StockPlanetTextures,OPX-NeidonPlus]
{
    @Body[Thatmo]
    {
        ParallaxScaledProperties {
            minTerrainAltitude = -1363.771
            maxTerrainAltitude = 8060.64
            usingStockMesh:NEEDS[Scatterer] = True
            mode = FromTerrain
            Material
            {
                _ColorMap = OPX-Parallax/NeidonPlus/PluginData/Textures/Thatmo/Thatmo_Color.dds
                _BumpMap = OPX-Parallax/NeidonPlus/PluginData/Textures/Thatmo/Thatmo_Normal.dds
                _HeightMap = OPX-Parallax/NeidonPlus/PluginData/Textures/Thatmo/Thatmo_Height.dds
                _AtmosphereRimMap = OPX-Parallax/NeidonPlus/PluginData/Textures/Thatmo/Thatmo_Atmo.dds

                _PlanetBumpScale = 1

                _OceanSpecularPower = 0.5
                _OceanSpecularIntensity = 0.35
                _AtmosphereThickness = 1
                _OceanAltitude = 0

                Keywords
                {
                    name = OCEAN_FROM_COLORMAP
                    name:NEEDS[!Scatterer] = ATMOSPHERE
                }
            }
            TerrainMaterialOverride
            {
                _SteepPower = 1
                _SteepContrast = 2
                _SteepMidpoint = 0.7
                _EmissionColor = 0,0,0,1
                _SpecularIntensity = 0.2
                _BumpScale = 0.3
                _Tiling = 0.0002
            }
        }
    }
}
